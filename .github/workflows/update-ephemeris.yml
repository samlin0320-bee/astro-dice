name: Update Ephemeris

on:
  schedule:
    # 每天 UTC 00:00 跑（台灣時間 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Generate ephemeris.json
        run: python tools/update_ephemeris.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ephemeris.json
          if git diff --staged --quiet; then
            echo "No changes to ephemeris.json"
          else
            git commit -m "chore: auto-update ephemeris.json"
            git push
          fi
